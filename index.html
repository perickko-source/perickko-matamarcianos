<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Matamarcianos HTML5</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    }
    canvas {
      display: block; width: auto; height: auto;
      max-width: 95vw; max-height: 95vh;
      aspect-ratio: 2 / 3;
      image-rendering: pixelated;
      touch-action: none; background: #000;
    }
    #overlay, #rotate-warning, #phase-msg, #victory-screen, #game-over-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: rgba(0,0,0,0.85); color: #fff; font-family: monospace; cursor: pointer; z-index: 10;
      text-align: center; padding: 20px; pointer-events: none;
    }
    #victory-screen { background: rgba(0,0,10,0.95); pointer-events: auto; display: none; }
    #game-over-screen { background: rgba(10,0,0,0.95); pointer-events: auto; display: none; }
    #victory-screen h1, #game-over-screen h1 {
      font-size: 32px; text-shadow: 0 0 15px; margin-bottom: 10px;
    }
    #victory-screen h1 { color: #0f0; text-shadow-color: #0f0; }
    #game-over-screen h1 { color: #f00; text-shadow-color: #f00; }
    #game-over-screen p, #victory-screen p { margin: 5px 0; color: #aaa; font-size: 18px; }
    #game-over-screen button, #victory-screen button {
      margin-top: 20px; padding: 10px 25px; font-family: monospace; font-size: 18px; font-weight: bold;
      border: none; color: #000; cursor: pointer; pointer-events: auto;
    }
    #game-over-screen button { background: #f00; }
    #victory-screen button { background: #0f0; }
    #phase-msg { display: none; background: transparent; z-index: 15; transition: opacity 0.3s; }
    #phase-msg h2 { font-size: 36px; text-shadow: 0 0 15px #0af; animation: pop 0.5s ease-out; }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    #overlay { background: rgba(0,0,0,0.9); pointer-events: auto; }
    #overlay h1 { margin: 0 0 10px 0; font-size: 28px; text-shadow: 0 0 10px #0af; }
    #overlay p { margin: 5px 0; font-size: 14px; color: #aaa; }
    #rotate-warning { display: none; z-index: 20; background: rgba(0,0,0,0.95); }
    #rotate-warning .icon { font-size: 48px; margin-bottom: 15px; animation: spin 2s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(90deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<div id="overlay">
  <h1>👾 MATAMARCIANOS 👾</h1>
  <p>Toca para empezar</p>
</div>

<div id="rotate-warning">
  <div class="icon">📱</div>
  <p>Por favor, gira tu dispositivo<br>a modo <strong>VERTICAL</strong></p>
</div>

<div id="phase-msg"><h2 id="phase-text">¡FASE 2!</h2></div>

<div id="victory-screen">
  <h1>🏆 ¡VICTORIA! 🏆</h1>
  <p id="victory-score">Puntuación Final: 0</p>
  <p id="victory-msg">Has completado las 3 fases</p>
  <button id="restart-btn">JUGAR DE NUEVO</button>
</div>

<div id="game-over-screen">
  <h1>💀 GAME OVER 💀</h1>
  <p id="game-over-score">Puntuación Final: 0</p>
  <button id="retry-btn">REINTENTAR</button>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 400, H = 600;
  canvas.width = W; canvas.height = H;

  if (screen.orientation?.lock) screen.orientation.lock('portrait').catch(() => {});

  const warning = document.getElementById('rotate-warning');
  function checkOrientation() { warning.style.display = window.innerWidth > window.innerHeight ? 'flex' : 'none'; }
  window.addEventListener('resize', checkOrientation);
  window.addEventListener('orientationchange', checkOrientation);
  checkOrientation();

  // 🖼️ ASSETS (Cebollo añadido)
  const imgs = {
    carlitos: new Image(), kiko: new Image(), koala: new Image(),
    nandors: new Image(), pepino: new Image(), perickko: new Image(), valefor: new Image(), paola: new Image(),
    enrique: new Image(),
    cebollo: new Image(), // 🆕
    player: new Image()
  };
  for(let key in imgs) imgs[key].src = key === 'player' ? 'nave.png' : `${key}.png`;

  const fallbackColors = {
    carlitos: '#f8a000', kiko: '#ff0', koala: '#bbb',
    nandors: '#0f0', pepino: '#a0f', perickko: '#00ffff', valefor: '#f0a', paola: '#ff007f',
    enrique: '#ff6600',
    cebollo: '#88cc88' // 🆕 Color fallback (verde cebolla)
  };

  // 🔊 AUDIO
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  
  function playSound(type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;

    if (type === 'playerShoot') {
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'square'; osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(220, t + 0.1);
      g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
      osc.start(t); osc.stop(t + 0.1);
    } else if (type === 'alienShoot') {
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(100, t + 0.15);
      g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
    } else if (type === 'explode') {
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(20, t + 0.3);
      g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
    } else if (type === 'dive') {
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t);
      osc.frequency.linearRampToValueAtTime(1200, t + 0.3);
      g.gain.setValueAtTime(0.15, t); g.gain.linearRampToValueAtTime(0, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
    } else if (type === 'bossAppear') {
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'square'; osc.frequency.setValueAtTime(150, t);
      osc.frequency.linearRampToValueAtTime(80, t + 0.5);
      g.gain.setValueAtTime(0.3, t); g.gain.linearRampToValueAtTime(0.1, t + 0.5);
      osc.start(t); osc.stop(t + 0.5);
    } else if (type === 'bossDefeat') {
      const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
      notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        const st = t + i * 0.12;
        osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, st);
        g.gain.setValueAtTime(0.15, st);
        g.gain.exponentialRampToValueAtTime(0.001, st + 0.6);
        osc.start(st); osc.stop(st + 0.6);
      });
    } else if (type === 'extraLife') {
      [880, 1100, 1320].forEach((freq, i) => {
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        const st = t + i * 0.1;
        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, st);
        g.gain.setValueAtTime(0.1, st);
        g.gain.exponentialRampToValueAtTime(0.01, st + 0.08);
        osc.start(st); osc.stop(st + 0.08);
      });
    }
  }

  // 🎮 ESTADO
  let gameRunning = false;
  let score = 0;
  let transitioning = false;
  let gameWon = false;
  let lives = 3;
  let extraLifeThreshold = 5000;
  let isInvincible = false;
  let invincibleTimer = 0;
  
  const keys = {};
  window.addEventListener('keydown', e => keys[e.code] = true);
  window.addEventListener('keyup', e => keys[e.code] = false);

  let isTouching = false;
  function setupTouch() {
    canvas.addEventListener('touchstart', (e) => { if (!gameRunning) return; isTouching = true; updateTouch(e.touches[0].clientX); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { if (!gameRunning || !isTouching) return; e.preventDefault(); updateTouch(e.touches[0].clientX); }, { passive: false });
    canvas.addEventListener('touchend', () => { isTouching = false; });
    canvas.addEventListener('touchcancel', () => { isTouching = false; });
  }
  setupTouch();

  function updateTouch(clientX) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const gameX = (clientX - rect.left) * scaleX;
    player.x = Math.max(0, Math.min(W - player.w, gameX - player.w / 2));
  }

  // 🌟 ESTRELLAS
  const stars = [];
  for (let i = 0; i < 120; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2 + 0.5, speed: Math.random() * 0.6 + 0.2 });

  // 🚀 JUGADOR
  const player = { x: W / 2 - 32, y: H - 80, w: 64, h: 64, speed: 5, cooldown: 0, autoCD: 0 };
  const pBullets = [], aBullets = [];
  const particles = [];

  // 🏆 FASES Y JEFES (Cebollo añadido)
  const PHASES = [
    { name: "FASE 1", enemies: ['kiko', 'koala', 'enrique'], bosses: [
      { type: 'koala',    threshold: 3500,  hp: 20 },
      { type: 'enrique',  threshold: 7500,  hp: 30 },
      { type: 'kiko',     threshold: 12000, hp: 40 }
    ]},
    { name: "FASE 2", enemies: ['carlitos', 'pepino', 'perickko'], bosses: [
      { type: 'carlitos', threshold: 18000, hp: 50 },
      { type: 'pepino',   threshold: 27000, hp: 60 },
      { type: 'perickko', threshold: 38000, hp: 70 }
    ]},
    { name: "FASE 3", enemies: ['nandors', 'paola', 'valefor', 'cebollo'], bosses: [
      { type: 'paola',    threshold: 52000,  hp: 80 },
      { type: 'nandors',  threshold: 70000,  hp: 90 },
      { type: 'valefor',  threshold: 92000,  hp: 100 },
      { type: 'cebollo',  threshold: 120000, hp: 110 } // 🆕 Jefe final de la fase
    ]}
  ];

  let currentPhaseIdx = 0;
  let currentBossIdx = 0;
  let enemies = [];
  let waveCount = 0;
  let time = 0;
  let alienShootTimer = 0; 
  let bossActive = false;
  let boss = { x: 0, y: 0, w: 140, h: 140, hp: 0, maxHp: 0, type: '', phase: 'enter', angle: 0, shootTimer: 0 };

  // 🛡️ UI FUNCIONES
  function showPhaseTransition(text) {
    setTimeout(() => {
      const el = document.getElementById('phase-msg');
      document.getElementById('phase-text').textContent = text;
      el.style.display = 'flex';
      setTimeout(() => { el.style.opacity = 0; setTimeout(() => { el.style.display = 'none'; el.style.opacity = 1; }, 300); }, 2000);
    }, 50);
  }

  function showVictory() {
    setTimeout(() => {
      gameWon = true;
      gameRunning = false;
      document.getElementById('victory-score').textContent = `Puntuación Final: ${score}`;
      document.getElementById('victory-msg').textContent = `Has completado las ${PHASES.length} fases`;
      document.getElementById('victory-screen').style.display = 'flex';
    }, 50);
  }

  function showGameOver() {
    gameRunning = false;
    document.getElementById('game-over-score').textContent = `Puntuación Final: ${score}`;
    document.getElementById('game-over-screen').style.display = 'flex';
  }

  function spawnWave() {
    if (transitioning || bossActive || gameWon) return;
    waveCount++;
    enemies = [];
    const phase = PHASES[currentPhaseIdx];
    const margin = 20;
    const spacing = (W - margin * 2 - 70 * 3) / 2;
    
    // Velocidad controlada por fase
    const phaseSpeed = 0.8 + (currentPhaseIdx * 0.2); // F1:0.8 | F2:1.0 | F3:1.2
    
    const rand = Math.random();
    let behaviorType;
    if (rand < 0.55) behaviorType = 'normal';
    else if (rand < 0.75) behaviorType = 'circle_left';
    else if (rand < 0.90) behaviorType = 'zigzag'; // Zig-Zag con rebote
    else behaviorType = 'circle_right';

    for (let i = 0; i < 3; i++) {
      let type = phase.enemies[Math.floor(Math.random() * phase.enemies.length)];
      let e = { w: 70, h: 70, alive: true, type: type, behavior: behaviorType };

      if (behaviorType === 'normal') {
        e.x = margin + i * (70 + spacing);
        e.y = -70 - (Math.random() * 100);
        e.baseX = margin + i * (70 + spacing);
        e.phase = i * 2.2; e.vy = phaseSpeed; e.isDiving = false; e.colorShift = 0;
      } 
      else if (behaviorType === 'zigzag') {
        e.x = margin + i * (70 + spacing);
        e.y = -70 - (Math.random() * 100);
        e.dx = (Math.random() > 0.5 ? 1.8 : -1.8) + (Math.random() * 0.6 - 0.3);
        e.vy = phaseSpeed;
      }
      else if (behaviorType === 'circle_left') {
        e.x = -80 - (i * 90); e.y = 300; e.state = 'enter';
        e.angle = Math.PI; e.circleProgress = 0; e.angularSpeed = 0.025; e.attackSpeed = 3.2; e.shootTimer = 0;
      } else {
        e.x = W + 80 + (i * 90); e.y = 300; e.state = 'enter_right';
        e.angle = 0; e.circleProgress = 0; e.angularSpeed = 0.025; e.attackSpeed = 3.2; e.shootTimer = 0;
      }
      enemies.push(e);
    }
  }

  function rectIntersect(r1, r2) { return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y; }
  function createExplosion(x, y) {
    for (let i = 0; i < 20; i++) particles.push({ x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, life: 30 + Math.random() * 10, color: `hsl(${Math.random() * 60 + 10}, 100%, 60%)` });
  }

  function startBoss() {
    if (transitioning || bossActive || currentBossIdx >= PHASES[currentPhaseIdx].bosses.length) return;
    const cfg = PHASES[currentPhaseIdx].bosses[currentBossIdx];
    enemies = []; 
    boss.type = cfg.type; boss.maxHp = cfg.hp; boss.hp = cfg.hp;
    boss.x = W / 2 - 70; boss.y = -150;
    boss.phase = 'enter'; boss.angle = 0; boss.shootTimer = 0;
    bossActive = true; transitioning = true;
    setTimeout(() => { transitioning = false; }, 800);
    playSound('bossAppear');
  }

  function resetGame() {
    score = 0; 
    lives = 3;
    extraLifeThreshold = 5000;
    currentPhaseIdx = 0; currentBossIdx = 0;
    bossActive = false; transitioning = false; gameWon = false;
    isInvincible = false;
    waveCount = 0; enemies = []; pBullets.length = 0; aBullets.length = 0; particles.length = 0;
    boss = { x: 0, y: 0, w: 140, h: 140, hp: 0, maxHp: 0, type: '', phase: 'enter', angle: 0, shootTimer: 0 };
    player.x = W / 2 - 32;
    document.getElementById('victory-screen').style.display = 'none';
    document.getElementById('game-over-screen').style.display = 'none';
    spawnWave();
    gameRunning = true;
    loop();
  }

  document.getElementById('restart-btn').addEventListener('click', () => { initAudio(); resetGame(); });
  document.getElementById('retry-btn').addEventListener('click', () => { initAudio(); resetGame(); });

  function playerHit() {
    if (isInvincible) return;
    lives--;
    isInvincible = true;
    invincibleTimer = 120;
    createExplosion(player.x + player.w/2, player.y + player.h/2);
    playSound('explode');
    player.x = W / 2 - player.w / 2;
    if (lives <= 0) showGameOver();
  }

  function update() {
    if (gameWon) return;
    time += 0.016;
    
    if (score >= extraLifeThreshold) { lives++; extraLifeThreshold += 5000; playSound('extraLife'); }
    if (isInvincible) { invincibleTimer--; if (invincibleTimer <= 0) isInvincible = false; }
    
    if (!isTouching) {
      if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
      if ((keys['ArrowRight'] || keys['KeyD']) && player.x < W - player.w) player.x += player.speed;
    }
    if (isTouching && player.autoCD <= 0) {
      pBullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 12, speed: 7 });
      player.autoCD = 15; playSound('playerShoot');
    }
    if (player.autoCD > 0) player.autoCD--;
    if (keys['Space'] && player.cooldown <= 0 && !isTouching) {
      pBullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 12, speed: 7 });
      player.cooldown = 15; playSound('playerShoot');
    }
    if (player.cooldown > 0) player.cooldown--;

    const phase = PHASES[currentPhaseIdx];
    if (!bossActive && !transitioning && currentBossIdx < phase.bosses.length && score >= phase.bosses[currentBossIdx].threshold) {
      startBoss();
    }

    let activeCount = 0;
    if (!bossActive) {
      for (let e of enemies) {
        if (!e.alive) continue;
        activeCount++;
        
        if (e.behavior === 'normal') {
          e.x = e.baseX + Math.sin(time * 2.2 + e.phase) * 35;
          if (e.x < 0) e.x = 0; if (e.x + e.w > W) e.x = W - e.w;
          e.y += e.vy;
          if (!e.isDiving && Math.random() < 0.005) { e.isDiving = true; e.vy *= 3.5; playSound('dive'); }
          if (e.isDiving) e.colorShift = Math.sin(time * 20) > 0 ? 1 : 0;
          if (e.y > H + 100) e.alive = false;
        } 
        else if (e.behavior === 'zigzag') {
          e.x += e.dx;
          e.y += e.vy;
          if (e.x <= 0) { e.x = 0; e.dx = -e.dx; }
          if (e.x + e.w >= W) { e.x = W - e.w; e.dx = -e.dx; }
          if (e.y > H + 100) e.alive = false;
        }
        else if (e.behavior === 'circle_left') {
          if (e.state === 'enter') { e.x += 3; if (e.x >= 100) { e.state = 'circle'; e.circleProgress = 0; e.angle = Math.PI; } }
          else if (e.state === 'circle') {
            e.circleProgress += e.angularSpeed; e.angle = Math.PI - e.circleProgress;
            e.x = 200 + Math.cos(e.angle) * 100; e.y = 300 + Math.sin(e.angle) * 100;
            if (e.circleProgress >= 4 * Math.PI) { e.state = 'attack'; playSound('dive'); }
          } else if (e.state === 'attack') {
            let dx = (player.x + player.w/2) - (e.x + e.w/2), dy = (player.y + player.h/2) - (e.y + e.h/2);
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 0) { e.x += (dx/dist) * e.attackSpeed; e.y += (dy/dist) * e.attackSpeed; }
            e.shootTimer++;
            if (e.shootTimer > 35 && e.y < player.y - 40) {
              aBullets.push({ x: e.x + e.w/2 - 2, y: e.y + e.h, w: 4, h: 12, speed: 4.5 }); playSound('alienShoot'); e.shootTimer = 0;
            }
            if (e.x < -150 || e.x > W + 150 || e.y > H + 150 || e.y < -150) e.alive = false;
          }
        } else if (e.behavior === 'circle_right') {
          if (e.state === 'enter_right') { e.x -= 3; if (e.x <= 300) { e.state = 'circle'; e.circleProgress = 0; e.angle = 0; } }
          else if (e.state === 'circle') {
            e.circleProgress += e.angularSpeed; e.angle = e.circleProgress;
            e.x = 200 + Math.cos(e.angle) * 100; e.y = 300 + Math.sin(e.angle) * 100;
            if (e.circleProgress >= 4 * Math.PI) { e.state = 'attack'; playSound('dive'); }
          } else if (e.state === 'attack') {
            let dx = (player.x + player.w/2) - (e.x + e.w/2), dy = (player.y + player.h/2) - (e.y + e.h/2);
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 0) { e.x += (dx/dist) * e.attackSpeed; e.y += (dy/dist) * e.attackSpeed; }
            e.shootTimer++;
            if (e.shootTimer > 35 && e.y < player.y - 40) {
              aBullets.push({ x: e.x + e.w/2 - 2, y: e.y + e.h, w: 4, h: 12, speed: 4.5 }); playSound('alienShoot'); e.shootTimer = 0;
            }
            if (e.x < -150 || e.x > W + 150 || e.y > H + 150 || e.y < -150) e.alive = false;
          }
        }
      }
      if (activeCount === 0 && !transitioning) spawnWave();
    } else {
      if (boss.phase === 'enter') { boss.y += 3; if (boss.y >= 50) boss.phase = 'fight'; }
      else if (boss.phase === 'fight') {
        boss.angle += 0.03;
        boss.x = W / 2 - 70 + Math.sin(boss.angle) * 85;
        boss.shootTimer++;
        if (boss.shootTimer > 25) {
          for(let off of [-1.5, -0.5, 0.5, 1.5]) {
            aBullets.push({ x: boss.x + boss.w/2 - 2 + off*12, y: boss.y + boss.h, w: 5, h: 12, speed: 4 });
          }
          playSound('alienShoot'); boss.shootTimer = 0;
        }
      }
    }

    if (!bossActive && !transitioning && enemies.some(e => e.alive && e.behavior === 'normal')) {
      alienShootTimer++;
      if (alienShootTimer > 60) {
        const targets = enemies.filter(e => e.alive && e.behavior === 'normal' && e.y > 0 && e.y < H - 100);
        if (targets.length > 0) {
          const shooter = targets[Math.floor(Math.random() * targets.length)];
          aBullets.push({ x: shooter.x + shooter.w / 2 - 2, y: shooter.y + shooter.h, w: 4, h: 12, speed: 4 });
          playSound('alienShoot');
        }
        alienShootTimer = 0;
      }
    }

    for (let i = pBullets.length - 1; i >= 0; i--) { pBullets[i].y -= pBullets[i].speed; if (pBullets[i].y < 0) pBullets.splice(i, 1); }
    for (let i = aBullets.length - 1; i >= 0; i--) { aBullets[i].y += aBullets[i].speed; if (aBullets[i].y > H) aBullets.splice(i, 1); }

    for (let i = pBullets.length - 1; i >= 0; i--) {
      if (bossActive && rectIntersect(pBullets[i], boss)) {
        boss.hp--;
        createExplosion(pBullets[i].x, pBullets[i].y);
        pBullets.splice(i, 1);
        if (boss.hp <= 0) {
          bossActive = false; transitioning = true; playSound('bossDefeat');
          createExplosion(boss.x + boss.w/2, boss.y + boss.h/2);
          createExplosion(boss.x + boss.w/3, boss.y + boss.h/3);
          createExplosion(boss.x + 2*boss.w/3, boss.y + 2*boss.h/3);
          score += 1500; currentBossIdx++;
          setTimeout(() => {
            if (currentBossIdx >= PHASES[currentPhaseIdx].bosses.length) {
              currentPhaseIdx++;
              if (currentPhaseIdx >= PHASES.length) showVictory();
              else { currentBossIdx = 0; showPhaseTransition(PHASES[currentPhaseIdx].name); }
            }
            transitioning = false; spawnWave();
          }, 1200);
        }
        break;
      }
      for (let e of enemies) {
        if (!e.alive) continue;
        if (rectIntersect(pBullets[i], e)) {
          e.alive = false; createExplosion(e.x + e.w / 2, e.y + e.h / 2);
          pBullets.splice(i, 1); score += 100; playSound('explode'); break;
        }
      }
    }

    if (!isInvincible) {
      for (let i = aBullets.length - 1; i >= 0; i--) {
        if (rectIntersect(aBullets[i], player)) { playerHit(); aBullets.splice(i, 1); break; }
      }
      for (let e of enemies) {
        if (e.alive && rectIntersect(e, player)) {
          playerHit(); e.alive = false; createExplosion(e.x + e.w/2, e.y + e.h/2); playSound('explode'); break;
        }
      }
      if (bossActive && rectIntersect(boss, player)) playerHit();
    }

    for (let i = particles.length - 1; i >= 0; i--) { particles[i].x += particles[i].vx; particles[i].y += particles[i].vy; particles[i].life--; if (particles[i].life <= 0) particles.splice(i, 1); }
    for (let s of stars) { s.y += s.speed; if (s.y > H) s.y = 0; }
  }

  function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    for (let s of stars) { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); }

    if (!isInvincible || Math.floor(time * 10) % 2 === 0) {
      if (imgs.player.complete && imgs.player.naturalWidth > 0) ctx.drawImage(imgs.player, player.x, player.y, player.w, player.h);
      else { ctx.fillStyle = '#0af'; ctx.fillRect(player.x, player.y, player.w, player.h); }
    }

    const lifeSize = 25;
    const padding = 8;
    const startY = H - lifeSize - 5;
    for (let i = 0; i < lives; i++) {
      if (imgs.player.complete && imgs.player.naturalWidth > 0) {
        ctx.drawImage(imgs.player, 10 + i * (lifeSize + padding), startY, lifeSize, lifeSize);
      } else {
        ctx.fillStyle = '#0af';
        ctx.fillRect(10 + i * (lifeSize + padding), startY, lifeSize, lifeSize);
      }
    }

    if (!bossActive) {
      for (let e of enemies) {
        if (!e.alive) continue;
        let img = imgs[e.type];
        if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, e.x, e.y, e.w, e.h);
        else {
          ctx.fillStyle = fallbackColors[e.type];
          if (e.behavior === 'normal' && e.isDiving && e.colorShift) ctx.fillStyle = '#ff0000';
          ctx.fillRect(e.x, e.y, e.w, e.h);
        }
      }
    }

    if (bossActive) {
      let img = imgs[boss.type];
      if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, boss.x, boss.y, boss.w, boss.h);
      else { ctx.fillStyle = fallbackColors[boss.type]; ctx.fillRect(boss.x, boss.y, boss.w, boss.h); }
      ctx.fillStyle = '#333'; ctx.fillRect(boss.x + 10, boss.y + boss.h + 10, boss.w - 20, 10);
      ctx.fillStyle = boss.hp > boss.maxHp * 0.3 ? '#0f0' : '#f00';
      ctx.fillRect(boss.x + 10, boss.y + boss.h + 10, Math.max(0, (boss.hp / boss.maxHp) * (boss.w - 20)), 10);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
      ctx.fillText(`JEFE: ${boss.type.toUpperCase()}`, W/2, boss.y + boss.h + 35); ctx.textAlign = 'start';
    }

    ctx.fillStyle = '#ff0'; for (let b of pBullets) ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = '#f00'; for (let b of aBullets) ctx.fillRect(b.x, b.y, b.w, b.h);
    for (let p of particles) { ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 40; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; }

    const phase = PHASES[currentPhaseIdx] || PHASES[0];
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace';
    ctx.fillText(`SCORE: ${score}`, 10, 20);
    ctx.fillText(`${phase.name}`, W / 2 - 40, 20);
    const nextBoss = currentBossIdx < phase.bosses.length ? phase.bosses[currentBossIdx] : null;
    ctx.fillText(`NEXT: ${nextBoss ? nextBoss.type.toUpperCase() : 'END'}`, W - 150, 20);
  }

  function loop() { if (!gameRunning) return; update(); draw(); requestAnimationFrame(loop); }
  document.getElementById('overlay').addEventListener('click', () => { initAudio(); gameRunning = true; document.getElementById('overlay').classList.add('hidden'); loop(); });
});
</script>
</body>
</html>
