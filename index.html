<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Matamarcianos HTML5 - Versión Final</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    }
    canvas {
      display: block; width: auto; height: auto;
      max-width: 95vw; max-height: 95vh;
      aspect-ratio: 80 / 129;
      image-rendering: pixelated;
      touch-action: none; background: #000;
    }
    #overlay, #rotate-warning, #phase-msg, #victory-screen, #game-over-screen, #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: rgba(0,0,0,0.85); color: #fff; font-family: monospace; cursor: pointer; z-index: 10;
      text-align: center; padding: 20px; pointer-events: none;
    }
    #loading-screen {
      background: #000;
      z-index: 9999;
    }
    #victory-screen { background: rgba(0,0,10,0.95); pointer-events: auto; display: none; }
    #game-over-screen { background: rgba(10,0,0,0.95); pointer-events: auto; display: none; }
    #victory-screen h1, #game-over-screen h1, #loading-screen h1 {
      font-size: 32px; text-shadow: 0 0 15px; margin-bottom: 10px;
    }
    #victory-screen h1 { color: #0f0; }
    #game-over-screen h1 { color: #f00; }
    #loading-screen h1 { color: #0af; }
    #game-over-screen p, #victory-screen p { margin: 5px 0; color: #aaa; font-size: 18px; }
    #game-over-screen button, #victory-screen button {
      margin-top: 20px; padding: 10px 25px; font-family: monospace; font-size: 18px; font-weight: bold;
      border: none; color: #000; cursor: pointer; pointer-events: auto;
    }
    #game-over-screen button { background: #f00; }
    #victory-screen button { background: #0f0; }
    #phase-msg { display: none; background: transparent; z-index: 15; transition: opacity 0.3s; }
    #phase-msg h2 { font-size: 36px; text-shadow: 0 0 15px #ff0; animation: pop 0.5s ease-out; }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    #overlay { background: rgba(0,0,0,0.9); pointer-events: auto; }
    #overlay h1 { margin: 0 0 10px 0; font-size: 28px; text-shadow: 0 0 10px #0af; }
    #overlay p { margin: 5px 0; font-size: 14px; color: #aaa; }
    #rotate-warning { display: none; z-index: 20; background: rgba(0,0,0,0.95); }
    #rotate-warning .icon { font-size: 48px; margin-bottom: 15px; animation: spin 2s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(90deg); } }
    .hidden { display: none !important; }

    /* 📻 RADIO */
    .radio-container {
      position: fixed;
      top: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 100;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
      pointer-events: none;
    }
    #radio-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 2px solid white;
      background: rgba(0,0,0,0.5);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      z-index: 101;
      pointer-events: auto;
    }
    #radio-btn:hover {
      background: rgba(0,0,0,0.8);
      transform: scale(1.1);
      border-color: #ffdd59;
    }
    .radio-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .radio-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }
    #radio-btn.loading .radio-overlay {
      opacity: 1;
      animation: spin 1s linear infinite;
    }
    #radio-btn.playing {
      border-color: #ff6b6b;
      animation: pulse-radio 2s infinite;
    }
    @keyframes pulse-radio {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(255, 107, 107, 0); }
    }
    .radio-label {
      font-size: 9px;
      color: white;
      text-align: center;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
      white-space: nowrap;
      font-weight: 500;
      max-width: 80px;
      line-height: 1.2;
      pointer-events: none;
    }

    /* ⚡ POWER-UP INDICATORS */
    #powerup-indicators {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
      pointer-events: none;
    }
    .powerup-indicator {
      background: rgba(0,0,0,0.7);
      border: 2px solid;
      border-radius: 8px;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      animation: powerupPulse 0.5s ease-in-out infinite;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .powerup-indicator.shield { border-color: #00ff00; background: rgba(0,255,0,0.2); }
    .powerup-indicator.triple { border-color: #ff0000; background: rgba(255,0,0,0.2); }
    .powerup-indicator.drone { border-color: #00ffff; background: rgba(0,255,255,0.2); }
    .powerup-indicator.rapid { border-color: #ffff00; background: rgba(255,255,0,0.2); }
    .powerup-indicator.laser { border-color: #ff00ff; background: rgba(255,0,255,0.2); }
    @keyframes powerupPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .powerup-timer {
      font-size: 12px;
      opacity: 0.8;
    }

    /* 🎬 PANTALLA DE INTRO */
    #intro-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    #intro-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .intro-image {
      width: 400px;
      max-width: 90vw;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: introImagePulse 2s ease-in-out infinite;
    }
    @keyframes introImagePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .intro-container {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      max-width: 90%;
      text-align: center;
    }
    .intro-text {
      color: #ecf0f1;
      font-size: 1.1rem;
      margin-bottom: 15px;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    }
    .intro-bar-container {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .intro-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f1c40f, #f39c12);
      border-radius: 4px;
      transition: width 0.1s linear;
      animation: introBarGlow 1.5s ease-in-out infinite;
    }
    @keyframes introBarGlow {
      0%, 100% { box-shadow: 0 0 5px #f1c40f; }
      50% { box-shadow: 0 0 15px #f1c40f; }
    }
    .intro-percentage {
      color: #f1c40f;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .intro-dots {
      display: inline-block;
      animation: introDots 1.5s infinite;
    }
    @keyframes introDots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    #loading-progress {
      font-size: 24px;
      color: #0f0;
      margin: 20px 0;
    }
    #loading-images {
      font-size: 14px;
      color: #888;
      max-width: 300px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <!-- 🎬 PANTALLA DE INTRO -->
  <div id="intro-screen">
    <img src="portada.png" alt="Cargando juego..." class="intro-image" onerror="this.style.display='none'; document.querySelector('.intro-text').textContent='⚠️ Error al cargar portada.png';">
    <div class="intro-container">
      <div class="intro-text" id="intro-text">Cargando Matamarcianos<span class="intro-dots"></span></div>
      <div class="intro-bar-container">
        <div class="intro-bar" id="intro-bar"></div>
      </div>
      <div class="intro-percentage" id="intro-percentage">0%</div>
    </div>
  </div>

  <!-- 📻 RADIO AUDIO -->
  <audio id="radio-audio" preload="none" crossorigin="anonymous">
    <source src="https://stream.zeno.fm/ndhkmuknva0uv" type="audio/mpeg">
  </audio>

  <canvas id="game" width="400" height="645"></canvas>

  <!-- ⚡ POWER-UP INDICATORS -->
  <div id="powerup-indicators"></div>

  <div id="overlay">
    <h1>👾 MATAMARCIANOS 👾</h1>
    <p>Toca para empezar</p>
  </div>

  <div id="rotate-warning">
    <div class="icon">📱</div>
    <p>Por favor, gira tu dispositivo<br>a modo <strong>VERTICAL</strong></p>
  </div>

  <div id="phase-msg"><h2 id="phase-text">¡FASE 2!</h2></div>

  <div id="victory-screen">
    <h1>🏆 ¡VICTORIA! 🏆</h1>
    <p id="victory-score">Puntuación Final: 0</p>
    <p id="victory-msg">Has completado las 4 fases + 3 Bonus</p>
    <button id="restart-btn">JUGAR DE NUEVO</button>
  </div>

  <div id="game-over-screen">
    <h1>💀 GAME OVER 💀</h1>
    <p id="game-over-score">Puntuación Final: 0</p>
    <button id="retry-btn">REINTENTAR</button>
  </div>

  <!-- 📻 BOTÓN RADIO -->
  <div class="radio-container">
    <button id="radio-btn" title="Escuchar 80 y 90 Radio">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgqvizWNyyqSmA1V6SOmns4wLWw849mHxRjABDTG0o2iyoHbsDPc9nc0rQW4iW6bfpIQLNn6pOgPlWsygdsuMury7g3ss1yJwDOJY1kHXyQwi53Lp9cyIMduU3NzUVaeme8n6V3_yhhGMEIb5XrCmuBejA6FoE5Uyt9ZmNYAqCxqhFmJf2wA9DpTtz9xg/s640/s80y90.png" 
           alt="80 y 90 Radio" 
           class="radio-img"
           id="radio-img">
      <div class="radio-overlay" id="radio-overlay">🔄</div>
    </button>
    <span class="radio-label">80 y 90<br>Radio</span>
  </div>

<script>
window.addEventListener('DOMContentLoaded', async () => {
  console.log('🎮 Iniciando Matamarcianos...');
  
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 400, H = 645;
  canvas.width = W; canvas.height = H;

  if (screen.orientation?.lock) screen.orientation.lock('portrait').catch(() => {});

  const warning = document.getElementById('rotate-warning');
  function checkOrientation() { warning.style.display = window.innerWidth > window.innerHeight ? 'flex' : 'none'; }
  window.addEventListener('resize', checkOrientation);
  window.addEventListener('orientationchange', checkOrientation);
  checkOrientation();

  // 🖼️ PRECARGAR IMÁGENES PRINCIPALES
  const imgs = {
    carlitos: new Image(), kiko: new Image(), koala: new Image(),
    nandors: new Image(), pepino: new Image(), perickko: new Image(), valefor: new Image(), paola: new Image(),
    enrique: new Image(), cebollo: new Image(), manoli: new Image(), spikeMike: new Image(), player: new Image()
  };
  for(let key in imgs) imgs[key].src = key === 'player' ? 'nave.png' : (key === 'spikeMike' ? 'spike-mike.png' : `${key}.png`);

  const fallbackColors = {
    carlitos: '#f8a000', kiko: '#ff0', koala: '#bbb', nandors: '#0f0', pepino: '#a0f', perickko: '#00ffff',
    valefor: '#f0a', paola: '#ff007f', enrique: '#ff6600', cebollo: '#88cc88', manoli: '#ff99cc', spikeMike: '#66ff66'
  };

  // ✅ PRECARGAR IMÁGENES BONUS
  const bonusImages = {};
  const bonusImageNames = ['masme', 'daniju', 'deivid', 'pakito', 'spike-mike', 'manoli', 'cebollo', 'koala'];
  
  let bonusImagesLoaded = 0;
  for (const name of bonusImageNames) {
    bonusImages[name] = new Image();
    bonusImages[name].src = `${name}.png`;
    bonusImages[name].onload = () => { bonusImagesLoaded++; console.log(`✅ ${name}.png cargado`); };
    bonusImages[name].onerror = () => { console.warn(`⚠️ ${name}.png no cargó`); bonusImagesLoaded++; };
  }

  // ✅ ESPERAR CARGA DE IMÁGENES
  let totalImages = Object.keys(imgs).length + bonusImageNames.length + 1;
  let loadedImages = 0;
  const portadaImg = document.querySelector('.intro-image');
  
  function imageLoaded() {
    loadedImages++;
    const percentage = Math.min(100, Math.round((loadedImages / totalImages) * 100));
    document.getElementById('intro-percentage').textContent = percentage + '%';
    document.getElementById('intro-bar').style.width = percentage + '%';
  }

  portadaImg.onload = imageLoaded;
  portadaImg.onerror = () => { console.warn('⚠️ portada.png no cargó'); imageLoaded(); };

  for(let key in imgs) {
    imgs[key].onload = imageLoaded;
    imgs[key].onerror = () => { console.warn(`⚠️ ${key}.png no cargó`); imageLoaded(); };
  }

  // 🔊 AUDIO
  let audioCtx = null;
  function initAudio() { 
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) { console.warn('⚠️ Audio no disponible'); }
  }

  function playSound(type) {
    if (!audioCtx) return;
    try {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const t = audioCtx.currentTime;
      if (type === 'playerShoot') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; o.frequency.setValueAtTime(880, t); o.frequency.exponentialRampToValueAtTime(220, t + 0.1);
        g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.1); o.start(t); o.stop(t + 0.1);
      } else if (type === 'alienShoot') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sawtooth'; o.frequency.setValueAtTime(300, t); o.frequency.exponentialRampToValueAtTime(100, t + 0.15);
        g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.15); o.start(t); o.stop(t + 0.15);
      } else if (type === 'explode') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sawtooth'; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(20, t + 0.3);
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.3); o.start(t); o.stop(t + 0.3);
      } else if (type === 'dive') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sawtooth'; o.frequency.setValueAtTime(400, t); o.frequency.linearRampToValueAtTime(1200, t + 0.3);
        g.gain.setValueAtTime(0.15, t); g.gain.linearRampToValueAtTime(0, t + 0.3); o.start(t); o.stop(t + 0.3);
      } else if (type === 'bossAppear') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; o.frequency.setValueAtTime(150, t); o.frequency.linearRampToValueAtTime(80, t + 0.5);
        g.gain.setValueAtTime(0.3, t); g.gain.linearRampToValueAtTime(0.1, t + 0.5); o.start(t); o.stop(t + 0.5);
      } else if (type === 'bossDefeat') {
        [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
          const s = t + i * 0.12; o.type = 'triangle'; o.frequency.setValueAtTime(f, s);
          g.gain.setValueAtTime(0.15, s); g.gain.exponentialRampToValueAtTime(0.001, s + 0.6); o.start(s); o.stop(s + 0.6);
        });
      } else if (type === 'extraLife') {
        [880, 1100, 1320].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
          const s = t + i * 0.1; o.type = 'sine'; o.frequency.setValueAtTime(f, s);
          g.gain.setValueAtTime(0.1, s); g.gain.exponentialRampToValueAtTime(0.01, s + 0.08); o.start(s); o.stop(s + 0.08);
        });
      } else if (type === 'powerupShield') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.setValueAtTime(600, t); o.frequency.linearRampToValueAtTime(1000, t + 0.3);
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.3); o.start(t); o.stop(t + 0.3);
      } else if (type === 'powerupTriple') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; o.frequency.setValueAtTime(700, t); o.frequency.linearRampToValueAtTime(1200, t + 0.3);
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.3); o.start(t); o.stop(t + 0.3);
      } else if (type === 'powerupDrone') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.setValueAtTime(800, t); o.frequency.linearRampToValueAtTime(1400, t + 0.4);
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.4); o.start(t); o.stop(t + 0.4);
      } else if (type === 'powerupRapid') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; o.frequency.setValueAtTime(900, t); o.frequency.linearRampToValueAtTime(1500, t + 0.3);
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.3); o.start(t); o.stop(t + 0.3);
      } else if (type === 'powerupLaser') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.setValueAtTime(1000, t); o.frequency.linearRampToValueAtTime(1800, t + 0.4);
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.4); o.start(t); o.stop(t + 0.4);
      } else if (type === 'droneShoot') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; o.frequency.setValueAtTime(500, t); o.frequency.exponentialRampToValueAtTime(300, t + 0.15);
        g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.15); o.start(t); o.stop(t + 0.15);
      } else if (type === 'shieldHit') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sawtooth'; o.frequency.setValueAtTime(400, t); o.frequency.exponentialRampToValueAtTime(200, t + 0.2);
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.2); o.start(t); o.stop(t + 0.2);
      } else if (type === 'powerupCollect') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.setValueAtTime(500, t); o.frequency.linearRampToValueAtTime(1000, t + 0.2);
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.2); o.start(t); o.stop(t + 0.2);
      } else if (type === 'laserShoot') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; o.frequency.setValueAtTime(1200, t); o.frequency.exponentialRampToValueAtTime(800, t + 0.1);
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.1); o.start(t); o.stop(t + 0.1);
      } else if (type === 'bonusWin') {
        [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
          const s = t + i * 0.15; o.type = 'triangle'; o.frequency.setValueAtTime(f, s);

  function updateGalaxianBonus() {

    formationOffsetX += formationSpeed * formationDirection;

    diveTimer++;

    galaxianEnemies.forEach(enemy => {
      if (!enemy.alive) return;
      if (enemy.diving) {
        enemy.diveTimer++;
        enemy.y += enemy.diveSpeed;
        enemy.x += Math.sin(enemy.diveTimer * 0.1) * 3;
        if (enemy.y > H + 50) { enemy.diving = false; enemy.returning = true; }

        const dx = targetX - enemy.x, dy = targetY - enemy.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

  for(let i=0; i<120; i++) stars.push({x:Math.random()*W, y:Math.random()*H, s:Math.random()*2+0.5, v:Math.random()*0.6+0.2});

  const player = { x: W/2-32, y: H-95, w: 64, h: 64, speed: 5, cooldown: 0, autoCD: 0 };
  let pBullets = [], aBullets = [], particles = [];

  const PHASES = [
    { name: "FASE 1", enemies: ['kiko','koala','enrique'], bosses: [{type:'koala', threshold:3500, hp:20, pattern:'oscillator'}, {type:'enrique', threshold:7500, hp:30, pattern:'charge'}, {type:'kiko', threshold:12000, hp:40, pattern:'sweep'}]},
    { name: "FASE 2", enemies: ['carlitos','pepino','perickko'], bosses: [{type:'carlitos', threshold:17000, hp:50, pattern:'circle'}, {type:'pepino', threshold:20500, hp:60, pattern:'rain'}, {type:'perickko', threshold:24000, hp:70, pattern:'curve'}]},
    { name: "FASE 3", enemies: ['manoli','nandors','valefor'], bosses: [{type:'manoli', threshold:29600, hp:80, pattern:'spiral8'}, {type:'nandors', threshold:33600, hp:90, pattern:'wall'}, {type:'valefor', threshold:37600, hp:100, pattern:'dualfan'}]},
    { name: "FASE 4", enemies: ['paola','cebollo','spikeMike'], bosses: [{type:'paola', threshold:45900, hp:110, pattern:'phases'}, {type:'spikeMike', threshold:50400, hp:120, pattern:'whirlwind'}, {type:'cebollo', threshold:54900, hp:130, pattern:'frenetic'}]}
  ];

  let currentPhaseIdx = 0, currentBossIdx = 0, enemies = [], waveCount = 0, time = 0, alienShootTimer = 0;
  let bossActive = false;
  let boss = { x:0, y:0, w:140, h:140, hp:0, maxHp:0, type:'', phase:'enter', pattern:'', state:'idle', dirX:1, sweep:0, angle:0, shootTimer:0, spiralAngle:0, fanAngle:0, cycleTimer:0, cycleIdx:0, rngTimer:0, rngPattern:'oscillator', wallGap: 7, _drawX: 0, _drawY: 0 };

  function showPhaseTransition(txt) {
    setTimeout(() => {
      const el = document.getElementById('phase-msg');
      document.getElementById('phase-text').textContent = txt; el.style.display = 'flex';
      setTimeout(() => { el.style.opacity = 0; setTimeout(() => { el.style.display = 'none'; el.style.opacity = 1; }, 300); }, 2000);
    }, 50);
  }

  function showVictory() {
    setTimeout(() => {
      gameWon = true; gameRunning = false;
      document.getElementById('victory-score').textContent = `Puntuación Final: ${score}`;
      document.getElementById('victory-msg').textContent = `Has completado las 4 fases + 3 Bonus`;
      document.getElementById('victory-screen').style.display = 'flex';
    }, 50);
  }

  function showGameOver() {
    gameRunning = false;
    document.getElementById('game-over-score').textContent = `Puntuación Final: ${score}`;
    document.getElementById('game-over-screen').style.display = 'flex';
  }

  function spawnWave() {
    if(transitioning || bossActive || gameWon || bonusActive || galaxianBonusActive || phoenixBonusActive) return;
    waveCount++; enemies = [];
    const phase = PHASES[currentPhaseIdx], margin = 20, spacing = (W - margin*2 - 70*3)/2;
    const phaseSpeed = 0.8 + (currentPhaseIdx * 0.2);
    const rand = Math.random();
    let bType = rand < 0.50 ? 'normal' : rand < 0.65 ? 'circle_left' : rand < 0.75 ? 'zigzag' : rand < 0.85 ? 'pendulum' : 'circle_right';
    for(let i=0; i<3; i++) {
      let type = phase.enemies[Math.floor(Math.random()*phase.enemies.length)], e = {w:70, h:70, alive:true, type, behavior:bType};
      if(bType==='normal') {
        e.x=margin+i*(70+spacing); e.y=-70-Math.random()*100; e.baseX=e.x; e.phase=i*2.2; e.vy=phaseSpeed; e.isDiving=false; e.colorShift=0;
      } else if(bType==='zigzag') {
        e.x=margin+i*(70+spacing); e.y=-70-Math.random()*100; e.dx=(Math.random()>0.5?1.8:-1.8)+(Math.random()*0.6-0.3); e.vy=phaseSpeed;
      } else if(bType==='pendulum') {
        e.x=margin+i*(70+spacing); e.y=-70-Math.random()*50; e.vy=phaseSpeed*0.3; e.pendTimer=0; e.diving=false; e.diveSpeed=phaseSpeed*4;
      } else if(bType==='circle_left') {
        e.x=-80-(i*90); e.y=H/2; e.state='enter'; e.angle=Math.PI; e.circleProgress=0; e.angularSpeed=0.025; e.attackSpeed=3.2; e.shootTimer=0;
      } else {
        e.x=W+80+(i*90); e.y=H/2; e.state='enter_right'; e.angle=0; e.circleProgress=0; e.angularSpeed=0.025; e.attackSpeed=3.2; e.shootTimer=0;
      }
      enemies.push(e);
    }
  }

  function rectInt(a,b) { return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
  function createExplosion(x,y) { for(let i=0;i<20;i++) particles.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:30+Math.random()*10,col:`hsl(${Math.random()*60+10},100%,60%)`}); }

  function startBoss() {
    if(transitioning||bossActive||currentBossIdx>=PHASES[currentPhaseIdx].bosses.length) return;
    const c = PHASES[currentPhaseIdx].bosses[currentBossIdx];
    enemies=[];
    boss.type=c.type; boss.maxHp=c.hp; boss.hp=c.hp;
    boss.x=W/2-70; boss.y=-200; boss._drawX=boss.x; boss._drawY=boss.y; boss.phase='enter';
    boss.pattern = c.pattern || 'oscillator';
    boss.state='idle'; boss.dirX=1; boss.sweep=0; boss.shootTimer=0; boss.angle=0; boss.spiralAngle=0; boss.fanAngle=0;
    boss.cycleTimer=0; boss.cycleIdx=0; boss.rngTimer=0; boss.rngPattern='oscillator';
    boss.wallGap = 7;
    bossActive=true;
    transitioning=true;
    setTimeout(()=>transitioning=false, 200);
    playSound('bossAppear');
  }

  function resetGame() {
    score=0; lives=3; extraLifeThreshold=5000; currentPhaseIdx=0; currentBossIdx=0; bossActive=false; transitioning=false; gameWon=false; gameOver=false; isInvincible=false;
    shieldActive=false; shieldHits=6; shieldMaxHits=6; doubleShotActive=false; doubleShotTimer=0; droneActive=false; droneTimer=900; drones=[];
    rapidFireActive=false; rapidFireTimer=0; laserActive=false; laserTimer=0;
    bonusActive = false; galaxianBonusActive = false; phoenixBonusActive = false;
    justFinishedBonus = false; bonusFinishTimer = 0;
    powerups = []; powerupSpawned = {};
    waveCount=0; enemies=[]; pBullets=[]; aBullets=[]; particles=[];
    boss={x:0,y:0,w:140,h:140,hp:0,maxHp:0,type:'',phase:'enter',pattern:'oscillator',state:'idle',dirX:1,sweep:0,angle:0,shootTimer:0,spiralAngle:0,fanAngle:0,cycleTimer:0,cycleIdx:0,rngTimer:0,rngPattern:'oscillator',wallGap:7, _drawX:0, _drawY:0};
    player.x=W/2-32; player.y=H-95;
    document.getElementById('victory-screen').style.display='none';
    document.getElementById('game-over-screen').style.display='none';
    document.getElementById('powerup-indicators').innerHTML = '';
    spawnWave(); gameRunning=true;
  }

  document.getElementById('restart-btn').addEventListener('click', ()=>{initAudio();resetGame();});
  document.getElementById('retry-btn').addEventListener('click', ()=>{initAudio();resetGame();});

  function playerHit() {
    if(isInvincible) return;
    if (shieldActive) {
      shieldHits--;
      playSound('shieldHit');
      createExplosion(player.x+player.w/2, player.y+player.h/2);
      if (shieldHits <= 0) shieldActive = false;
      updatePowerupIndicators();
      return;
    }
    lives--; isInvincible=true; invincibleTimer=120;
    createExplosion(player.x+player.w/2, player.y+player.h/2); playSound('explode'); player.x=W/2-player.w/2; player.y=H-95;
    if(lives<=0) showGameOver();
  }

  function update() {
    if(gameWon || gameOver) return;
    time += 0.016;
    if(score>=extraLifeThreshold) { lives++; extraLifeThreshold+=5000; playSound('extraLife'); }
    if(isInvincible) { invincibleTimer--; if(invincibleTimer<=0) isInvincible=false; }
    if(!isTouching) {
      if ((keys['ArrowLeft']||keys['KeyA'])&&player.x>0) player.x-=player.speed;
      if ((keys['ArrowRight']||keys['KeyD'])&&player.x<W-player.w) player.x+=player.speed;
    }
    if(isTouching&&player.autoCD<=0) {
      if (laserActive) { pBullets.push({x:player.x+player.w/2-3,y:player.y,w:6,h:18,s:12,isLaser:true}); playSound('laserShoot'); player.autoCD = rapidFireActive ? 5 : 15; }
      else if (doubleShotActive) { pBullets.push({x:player.x+player.w/2-6,y:player.y,w:4,h:12,s:7}); pBullets.push({x:player.x+player.w/2+2,y:player.y,w:4,h:12,s:7}); playSound('playerShoot'); player.autoCD = 15; }
      else { pBullets.push({x:player.x+player.w/2-2,y:player.y,w:4,h:12,s:7}); playSound('playerShoot'); player.autoCD = 15; }
    }
    if(player.autoCD>0) player.autoCD--;
    if(keys['Space']&&player.cooldown<=0&&!isTouching) {
      if (laserActive) { pBullets.push({x:player.x+player.w/2-3,y:player.y,w:6,h:18,s:12,isLaser:true}); playSound('laserShoot'); player.cooldown = rapidFireActive ? 5 : 15; }
      else if (doubleShotActive) { pBullets.push({x:player.x+player.w/2-6,y:player.y,w:4,h:12,s:7}); pBullets.push({x:player.x+player.w/2+2,y:player.y,w:4,h:12,s:7}); playSound('playerShoot'); player.cooldown = 15; }
      else { pBullets.push({x:player.x+player.w/2-2,y:player.y,w:4,h:12,s:7}); playSound('playerShoot'); player.cooldown = 15; }
    }
    if(player.cooldown>0) player.cooldown--;

    updatePowerups();
    checkPowerupSpawn();
    updatePhysicalPowerups();

    // CHECK BONUS TRIGGERS
    if (currentPhaseIdx === 0 && currentBossIdx >= 3 && !bonusActive && !galaxianBonusActive && !phoenixBonusActive) { startBonus(); return; }
    if (currentPhaseIdx === 1 && currentBossIdx >= 3 && !bonusActive && !galaxianBonusActive && !phoenixBonusActive) { galaxianBonusActive = true; createGalaxianFormation(); showPhaseTransition('⭐ BONUS ⭐'); return; }
    if (currentPhaseIdx === 2 && currentBossIdx >= 3 && !bonusActive && !galaxianBonusActive && !phoenixBonusActive) { startPhoenixBonus(); return; }

    // TRANSICIÓN POST-BONUS
    if (justFinishedBonus) {
      bonusFinishTimer--;
      if (bonusFinishTimer <= 0) {
        justFinishedBonus = false;
        currentPhaseIdx = nextPhaseAfterBonus;
        currentBossIdx = 0;
      }
    }

    // MOVER BALAS
    for(let i=pBullets.length-1;i>=0;i--){pBullets[i].y-=pBullets[i].s;if(pBullets[i].y<0)pBullets.splice(i,1);}
    for(let i=aBullets.length-1;i>=0;i--){
      let b=aBullets[i];
      if(b.vx!==undefined||b.vy!==undefined){
        b.x+=b.vx||0; b.y+=b.vy||0;
        if(b.accel) b.vy+=b.accel;
        if(b.curve){
          b.age = (b.age||0)+1;
          if(b.age < 20) {
             let dx=player.x+player.w/2-b.x, dy=player.y+player.h/2-b.y, d=Math.sqrt(dx*dx+dy*dy)||1;
             b.vx+=(dx/d)*0.04; b.vy+=(dy/d)*0.04;
          }
          let spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
          if(spd>b.s){b.vx*=b.s/spd;b.vy*=b.s/spd;}
        }
      } else { b.y+=b.s; }
      if(b.y>H+50||b.y<-50||b.x<-50||b.x>W+50)aBullets.splice(i,1);
    }

    // BONUS UPDATES
    if (bonusActive) {
      updateBonus();
      for (let i = aBullets.length - 1; i >= 0; i--) {
        if (rectInt(aBullets[i], player)) { playerHit(); aBullets.splice(i, 1); break; }
      }
      return;
    }
    if (galaxianBonusActive) {
      updateGalaxianBonus();
      for (let i = aBullets.length - 1; i >= 0; i--) {
        if (rectInt(aBullets[i], player)) { playerHit(); aBullets.splice(i, 1); break; }
      }
      return;
    }
    if (phoenixBonusActive) {
      updatePhoenixBonus();
      return;
    }

    const phase = PHASES[currentPhaseIdx];
    if(!bossActive&&!transitioning&&currentBossIdx<phase.bosses.length&&score>=phase.bosses[currentBossIdx].threshold && !justFinishedBonus) startBoss();

    let active=0;
    if(!bossActive) {
      enemies.forEach(e => {
        if(!e.alive) return; active++;
        if(e.behavior==='normal') {
          e.x=e.baseX+Math.sin(time*2.2+e.phase)*35; if(e.x<0)e.x=0; if(e.x+e.w>W)e.x=W-e.w; e.y+=e.vy;
          if(!e.isDiving&&Math.random()<0.005){e.isDiving=true;e.vy*=3.5;playSound('dive');}
          if(e.isDiving)e.colorShift=Math.sin(time*20)>0?1:0;
          if(e.y>H+100)e.alive=false;
        } else if(e.behavior==='zigzag') {
          e.x+=e.dx; e.y+=e.vy;
          if(e.x<=0){e.x=0;e.dx=-e.dx;} if(e.x+e.w>=W){e.x=W-e.w;e.dx=-e.dx;}
          if(e.y>H+100)e.alive=false;
        } else if(e.behavior==='pendulum') {
          e.pendTimer++;
          if(!e.diving) { e.x+=Math.sin(time*5+e.type.charCodeAt(0))*2; e.y+=e.vy; if(e.pendTimer>180) e.diving=true; }
          else { e.y+=e.diveSpeed; if(e.x<player.x) e.x+=1.5; else e.x-=1.5; }
          if(e.y>H+100)e.alive=false;
        } else if(e.behavior==='circle_left') {
          if(e.state==='enter'){e.x+=3;if(e.x>=100){e.state='circle';e.circleProgress=0;e.angle=Math.PI;}}
          else if(e.state==='circle'){e.circleProgress+=e.angularSpeed;e.angle=Math.PI-e.circleProgress;e.x=200+Math.cos(e.angle)*100;e.y=H/2+Math.sin(e.angle)*100;if(e.circleProgress>=4*Math.PI){e.state='attack';playSound('dive');}}
          else if(e.state==='attack'){let dx=player.x+player.w/2-(e.x+e.w/2),dy=player.y+player.h/2-(e.y+e.h/2),d=Math.sqrt(dx*dx+dy*dy);if(d>0){e.x+=(dx/d)*e.attackSpeed;e.y+=(dy/d)*e.attackSpeed;}e.shootTimer++;if(e.shootTimer>35&&e.y<player.y-40){aBullets.push({x:e.x+e.w/2-2,y:e.y+e.h,w:4,h:12,s:4.5});playSound('alienShoot');e.shootTimer=0;}if(e.x<-150||e.x>W+150||e.y>H+150||e.y<-150)e.alive=false;}
        } else if(e.behavior==='circle_right') {
          if(e.state==='enter_right'){e.x-=3;if(e.x<=300){e.state='circle';e.circleProgress=0;e.angle=0;}}
          else if(e.state==='circle'){e.circleProgress+=e.angularSpeed;e.angle=e.circleProgress;e.x=200+Math.cos(e.angle)*100;e.y=H/2+Math.sin(e.angle)*100;if(e.circleProgress>=4*Math.PI){e.state='attack';playSound('dive');}}
          else if(e.state==='attack'){let dx=player.x+player.w/2-(e.x+e.w/2),dy=player.y+player.h/2-(e.y+e.h/2),d=Math.sqrt(dx*dx+dy*dy);if(d>0){e.x+=(dx/d)*e.attackSpeed;e.y+=(dy/d)*e.attackSpeed;}e.shootTimer++;if(e.shootTimer>35&&e.y<player.y-40){aBullets.push({x:e.x+e.w/2-2,y:e.y+e.h,w:4,h:12,s:4.5});playSound('alienShoot');e.shootTimer=0;}if(e.x<-150||e.x>W+150||e.y>H+150||e.y<-150)e.alive=false;}
        }
      });
      if(active===0&&!transitioning) spawnWave();
    } else {
      if(boss.phase==='enter'){
        boss.y+=8;
        boss._drawX = boss.x + (Math.random()-0.5)*4;
        boss._drawY = boss.y + (Math.random()-0.5)*2;
        if(boss.y>=50){
          boss.phase='fight';
          boss._drawX = boss.x;
          boss._drawY = boss.y;
        }
      }
      else if(boss.phase==='fight'){
        let isEnraged = boss.pattern==='frenetic' && boss.hp < boss.maxHp*0.2;
        let speedM = isEnraged ? 1.5 : 1;
        switch(boss.pattern) {
          case 'oscillator':
            boss.angle += 0.03*speedM;
            boss.x = W/2-70+Math.sin(boss.angle)*85;
            if(boss.shootTimer>=25){for(let o of[-1.5,-0.5,0.5,1.5])aBullets.push({x:boss.x+boss.w/2-2+o*12,y:boss.y+boss.h,w:5,h:12,s:4});boss.shootTimer=0;}
            break;
          case 'charge':
            if(boss.state==='idle'){
              boss.x = W/2 - 70 + Math.sin(time * 1.8) * 110;
              if(boss.shootTimer > 60){ boss.state='charge'; boss.timer=0; }
            } else if(boss.state==='charge'){
              let d = player.x - boss.x;
              boss.x += (d > 0 ? 1 : -1) * 4.5 * speedM;
              boss.y += 2.5 * speedM;
              if(boss.shootTimer >= 6){ aBullets.push({x:boss.x+boss.w/2-2, y:boss.y+boss.h, w:4, h:12, s:5}); boss.shootTimer=0; }
              boss.timer++;
              if(boss.timer > 30 || boss.y > H - 150){ boss.state='retreat'; boss.timer=0; }
            } else if(boss.state==='retreat'){
              boss.y -= 3.5 * speedM;
              if(boss.y <= 60){ boss.y = 60; boss.state='idle'; boss.shootTimer=0; }
            }
            break;
          case 'sweep':
            boss.dirX = boss.dirX || 1;
            boss.x += boss.dirX * 2.5 * speedM;
            if(boss.x <= 0 || boss.x + boss.w >= W - 20) boss.dirX *= -1;
            if(boss.shootTimer >= 45) {
              for(let i=-2; i<=2; i++) aBullets.push({x:boss.x+boss.w/2-2+i*14, y:boss.y+boss.h, w:4, h:12, s:3.2});
              boss.shootTimer = 0;
            }
            break;
          case 'circle':
            boss.x = W/2 - 70 + Math.sin(time * 2) * 100;
            boss.y = 60 + Math.cos(time * 1.5) * 20;
            if(boss.shootTimer>=60){
              for(let i=0;i<12;i++){
                let a=(Math.PI*2/12)*i;
                aBullets.push({x:boss.x+boss.w/2+Math.cos(a)*10,y:boss.y+boss.h/2+Math.sin(a)*10,w:4,h:12,s:3.5,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5});
              }
              boss.shootTimer=0;
            }
            break;
          case 'rain':
            boss.x=200+Math.sin(time*2)*110; boss.y=60;
            if(boss.shootTimer>=8){aBullets.push({x:boss.x+boss.w/2-2,y:boss.y+boss.h,w:4,h:12,s:1.8,vy:1.8,accel:0.06});boss.shootTimer=0;}
            break;
          case 'curve':
            boss.x += Math.sin(time)*1.8*speedM; boss.y = 140 + Math.cos(time*0.5)*35;
            if(boss.shootTimer >= 65) {
              for(let i=-1; i<=1; i++){
                let dx = (player.x+player.w/2) - (boss.x+boss.w/2) + i*40;
                let dy = (player.y+player.h/2) - (boss.y+boss.h);
                let d = Math.sqrt(dx*dx+dy*dy) || 1;
                aBullets.push({x:boss.x+boss.w/2-2+i*8, y:boss.y+boss.h, w:4, h:12, s:3.5, vx:(dx/d)*3.5, vy:(dy/d)*3.5, curve:true, age:0});
              }
              boss.shootTimer = 0;
            }
            break;
          case 'spiral8':
            boss.x=200+120*Math.sin(time*1.5)-35; boss.y=200+90*Math.sin(time*0.9);
            boss.spiralAngle+=0.22*speedM;
            if(boss.shootTimer>=5){aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:3.6,vx:Math.cos(boss.spiralAngle)*3.6,vy:Math.sin(boss.spiralAngle)*3.6});boss.shootTimer=0;}
            break;
          case 'wall':
            boss.x = W/2 - 70 + Math.sin(time * 1.2) * 35;
            boss.y = 110 + Math.cos(time * 0.8) * 25;
            if(boss.shootTimer >= 75) {
              boss.wallGap += Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0;
              boss.wallGap = Math.max(2, Math.min(11, boss.wallGap));
              for(let i = 0; i < 14; i++) {
                if(i >= boss.wallGap - 2 && i <= boss.wallGap + 2) continue;
                aBullets.push({x: boss.x - 126 + i*20, y: boss.y + boss.h, w:4, h:12, s:2.0});
              }
              boss.shootTimer = 0;
            }
            break;
          case 'dualfan':
            boss.x = W/2 - 70 + Math.sin(time * 2.5) * 85;
            boss.y = 150 + Math.cos(time * 0.7) * 25;
            if(boss.shootTimer >= 22) { 
              boss.fanAngle = (boss.fanAngle || 0) + 0.20;
              for(let o=0; o<3; o++){
                let a1 = boss.fanAngle + o*0.55, a2 = -boss.fanAngle + o*0.55;
                aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:3.0,vx:Math.cos(a1)*3.0,vy:Math.sin(a1)*3.0});
                aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:3.0,vx:Math.cos(a2)*3.0,vy:Math.sin(a2)*3.0});
              }
              boss.shootTimer = 0;
            }
            break;
          case 'phases':
            let hpRatio = boss.hp / boss.maxHp;
            if(hpRatio > 0.66) {
              boss.x = 200 + 120*Math.sin(time*1.5) - 35; boss.y = 200 + 90*Math.sin(time*0.9);
              boss.spiralAngle += 0.22;
              if(boss.shootTimer >= 5){ aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:3.6,vx:Math.cos(boss.spiralAngle)*3.6,vy:Math.sin(boss.spiralAngle)*3.6}); boss.shootTimer = 0; }
            } else if(hpRatio > 0.33) {
              boss.x += Math.sin(time)*1.8*speedM; boss.y = 140 + Math.cos(time*0.5)*35;
              if(boss.shootTimer >= 65) {
                for(let i=-1; i<=1; i++){
                  let dx = (player.x+player.w/2) - (boss.x+boss.w/2) + i*40, dy = (player.y+player.h/2) - (boss.y+boss.h), d = Math.sqrt(dx*dx+dy*dy) || 1;
                  aBullets.push({x:boss.x+boss.w/2-2+i*8,y:boss.y+boss.h,w:4,h:12,s:3.5,vx:(dx/d)*3.5,vy:(dy/d)*3.5,curve:true,age:0});
                }
                boss.shootTimer = 0;
              }
            } else {
              boss.x+=(Math.random()-0.5)*2.5*speedM; boss.y+=(Math.random()-0.5)*1.2*speedM;
              if(boss.shootTimer>=60){
                for(let i=0;i<12;i++){let a=(Math.PI*2/12)*i;aBullets.push({x:boss.x+boss.w/2+Math.cos(a)*10,y:boss.y+boss.h/2+Math.sin(a)*10,w:4,h:12,s:3.5,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5});}
                boss.shootTimer = 0;
              }
            }
            break;
          case 'whirlwind': {
            boss.cycleTimer++;
            if(boss.cycleTimer > 45) { boss.cycleTimer = 0; boss.cycleIdx = (boss.cycleIdx + 1) % 3; }
            let smPattern = boss.cycleIdx === 0 ? 'spiral8' : boss.cycleIdx === 1 ? 'rain' : 'dualfan';
            let smX = boss.x, smY = boss.y;
            if(smPattern === 'spiral8') { smX = 200 + 110*Math.sin(time*1.5) - 35; smY = 180 + 80*Math.sin(time*0.9); boss.spiralAngle += 0.22; if(boss.shootTimer >= 5) { aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:3.6,vx:Math.cos(boss.spiralAngle)*3.6,vy:Math.sin(boss.spiralAngle)*3.6}); boss.shootTimer=0; } }
            else if(smPattern === 'rain') { smX = 200 + Math.sin(time*2)*100; smY = 60; if(boss.shootTimer >= 8) { aBullets.push({x:boss.x+boss.w/2-2,y:boss.y+boss.h,w:4,h:12,s:1.8,vy:1.8,accel:0.06}); boss.shootTimer=0; } }
            else { smX = W/2 - 70 + Math.sin(time*2.5)*85; smY = 140 + Math.cos(time*0.7)*20; if(boss.shootTimer >= 22) { boss.fanAngle = (boss.fanAngle||0)+0.20; for(let o=0;o<3;o++){let a1=boss.fanAngle+o*0.55,a2=-boss.fanAngle+o*0.55;aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:3.0,vx:Math.cos(a1)*3.0,vy:Math.sin(a1)*3.0});aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:3.0,vx:Math.cos(a2)*3.0,vy:Math.sin(a2)*3.0});} boss.shootTimer=0; } }
            boss.x += (smX - boss.x) * 0.08; boss.y += (smY - boss.y) * 0.08;
            break;
          }
          case 'frenetic': {
            boss.rngTimer++;
            if(boss.rngTimer > 40) {
              boss.rngTimer = 0;
              boss.rngPattern = ['oscillator','spiral8','dualfan','charge'][Math.floor(Math.random()*4)];
              if(boss.rngPattern === 'charge') { boss.state = 'idle'; boss.timer = 0; }
              if(boss.rngPattern === 'dualfan') boss.fanAngle = 0;
            }
            let tX = boss.x, tY = boss.y, sp = isEnraged ? 1.3 : 1.0;
            if(boss.rngPattern === 'oscillator') { tX = W/2-70+Math.sin(time*2.5)*110; tY = 150+Math.cos(time*2)*40; if(boss.shootTimer>=25){for(let o=-2;o<=2;o++)aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:3.5,vx:o*1.5,vy:3.5});boss.shootTimer=0;} }
            else if(boss.rngPattern === 'spiral8') { tX = 200+100*Math.sin(time*2)-35; tY = 180+70*Math.sin(time*1.5); boss.spiralAngle+=0.25*sp; if(boss.shootTimer>=6){aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:4,vx:Math.cos(boss.spiralAngle)*4,vy:Math.sin(boss.spiralAngle)*4});boss.shootTimer=0;} }
            else if(boss.rngPattern === 'dualfan') { tX = W/2-70+Math.sin(time*2.5)*90; tY = 140+Math.cos(time)*30; if(boss.shootTimer>=20){boss.fanAngle=(boss.fanAngle||0)+0.4;for(let o=-1;o<=1;o++){let a1=boss.fanAngle+o*0.6,a2=-boss.fanAngle+o*0.6;aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:3.5,vx:Math.cos(a1)*3.5,vy:Math.sin(a1)*3.5});aBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h,w:4,h:12,s:3.5,vx:Math.cos(a2)*3.5,vy:Math.sin(a2)*3.5});}boss.shootTimer=0;} }
            else if(boss.rngPattern === 'charge') { if(boss.state==='idle'){tX=W/2-70+Math.sin(time*3)*100;tY=100+Math.cos(time*2)*30;if(boss.timer++>40){boss.state='charge';boss.timer=0;}}else if(boss.state==='charge'){tY=H-150;tX+=(player.x-boss.x>0?1:-1)*4*sp;if(boss.shootTimer>=8){aBullets.push({x:boss.x+boss.w/2-2,y:boss.y+boss.h,w:4,h:12,s:4});boss.shootTimer=0;}if(boss.timer++>30){boss.state='idle';boss.timer=0;boss.shootTimer=0;}} }
            boss.x += (tX - boss.x) * 0.08; boss.y += (tY - boss.y) * 0.08;
            let shX = isEnraged ? (Math.random()-0.5)*4 : 0, shY = isEnraged ? (Math.random()-0.5)*4 : 0;
            boss._drawX = boss.x + shX; boss._drawY = boss.y + shY;
            break;
          }
        }
        boss.shootTimer++;
        boss.x = Math.max(-30, Math.min(W-30, boss.x));
        boss.y = Math.max(30, Math.min(H-200, boss.y));
        if(boss.pattern !== 'frenetic') { boss._drawX = boss.x; boss._drawY = boss.y; }
      }
    }

    if(!bossActive&&!transitioning&&enemies.some(e=>e.alive&&e.behavior==='normal')){alienShootTimer++;if(alienShootTimer>60){const t=enemies.filter(e=>e.alive&&e.behavior==='normal'&&e.y>0&&e.y<H-100);if(t.length){const s=t[Math.floor(Math.random()*t.length)];aBullets.push({x:s.x+s.w/2-2,y:s.y+s.h,w:4,h:12,s:4});playSound('alienShoot');}alienShootTimer=0;}}

    for(let i=pBullets.length-1;i>=0;i--){
      if(bossActive&&rectInt(pBullets[i],boss)){boss.hp--;createExplosion(pBullets[i].x,pBullets[i].y);pBullets.splice(i,1);if(boss.hp<=0){bossActive=false;transitioning=true;playSound('bossDefeat');createExplosion(boss.x+boss.w/2,boss.y+boss.h/2);score+=1500;currentBossIdx++;setTimeout(()=>{if(currentBossIdx>=PHASES[currentPhaseIdx].bosses.length){currentPhaseIdx++;if(currentPhaseIdx>=PHASES.length)showVictory();else{currentBossIdx=0;showPhaseTransition(PHASES[currentPhaseIdx].name);}}transitioning=false;spawnWave();},1200);}break;}
      for(let e of enemies){if(!e.alive)continue;if(rectInt(pBullets[i],e)){e.alive=false;createExplosion(e.x+e.w/2,e.y+e.h/2);pBullets.splice(i,1);score+=100;playSound('explode');break;}}
    }

    if(!isInvincible){
      for(let i=aBullets.length-1;i>=0;i--){if(rectInt(aBullets[i],player)){playerHit();aBullets.splice(i,1);break;}}
      for(let e of enemies){if(e.alive&&rectInt(e,player)){playerHit();e.alive=false;createExplosion(e.x+e.w/2,e.y+e.h/2);playSound('explode');break;}}
      if(bossActive&&rectInt(boss,player))playerHit();
    }

    for(let i=particles.length-1;i>=0;i--){particles[i].x+=particles[i].vx;particles[i].y+=particles[i].vy;particles[i].life--;if(particles[i].life<=0)particles.splice(i,1);}
    for(let s of stars){s.y+=s.v;if(s.y>H)s.y=0;}
  }

  function draw() {
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';for(let s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill();}
    if(!isInvincible||Math.floor(time*10)%2===0){if(imgs.player.complete&&imgs.player.naturalWidth>0)ctx.drawImage(imgs.player,player.x,player.y,player.w,player.h);else{ctx.fillStyle='#0af';ctx.fillRect(player.x,player.y,player.w,player.h);}}
    if (shieldActive) {
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.sin(time * 10) * 0.2;
      ctx.strokeStyle = '#00ff00';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(player.x + player.w/2, player.y + player.h/2, 45, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowColor = '#00ff00';
      ctx.shadowBlur = 15;
      ctx.stroke();
      ctx.restore();
    }
    if (droneActive && drones.length > 0) {
      drones.forEach(drone => {
        ctx.fillStyle = '#00ffff';
        ctx.beginPath();
        ctx.arc(drone.x + 8, drone.y + 8, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = '#00ffff';
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }
    const lifeSize = 25, padding = 8, startY = H - lifeSize;
    for(let i=0;i<lives;i++){if(imgs.player.complete&&imgs.player.naturalWidth>0)ctx.drawImage(imgs.player,10+i*(lifeSize+padding),startY,lifeSize,lifeSize);else{ctx.fillStyle='#0af';ctx.fillRect(10+i*(lifeSize+padding),startY,lifeSize,lifeSize);}}
    if(!bonusActive && !galaxianBonusActive && !phoenixBonusActive) {
      if(!bossActive){
        enemies.forEach(e=>{
          if(!e.alive)return;
          let img=imgs[e.type];
          if(img&&img.complete&&img.naturalWidth>0)ctx.drawImage(img,e.x,e.y,e.w,e.h);
          else{ctx.fillStyle=fallbackColors[e.type];if(e.behavior==='normal'&&e.isDiving&&e.colorShift)ctx.fillStyle='#ff0000';ctx.fillRect(e.x,e.y,e.w,e.h);}
        });
      }
      if(bossActive){
        let img=imgs[boss.type];
        if(img&&img.complete&&img.naturalWidth>0) ctx.drawImage(img, boss._drawX, boss._drawY, boss.w, boss.h);
        else { ctx.fillStyle=fallbackColors[boss.type]; ctx.fillRect(boss._drawX, boss._drawY, boss.w, boss.h); }
        ctx.fillStyle = '#333'; ctx.fillRect(boss._drawX+10, boss._drawY+boss.h+10, boss.w-20, 10);
        ctx.fillStyle = boss.hp > boss.maxHp*0.3 ? '#0f0' : '#f00';
        ctx.fillRect(boss._drawX+10, boss._drawY+boss.h+10, Math.max(0, (boss.hp/boss.maxHp)*(boss.w-20)), 10);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
        ctx.fillText(`JEFE: ${boss.type.toUpperCase()}`, W/2, boss._drawY+boss.h+35); ctx.textAlign = 'start';
      }
    } else if (bonusActive) {
      drawBonus();
    } else if (galaxianBonusActive) {
      drawGalaxianBonus();
    } else if (phoenixBonusActive) {
      drawPhoenixBonus();
    }
    ctx.fillStyle='#ff0';for(let b of pBullets)ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.fillStyle='#f00';for(let b of aBullets)ctx.fillRect(b.x,b.y,b.w,b.h);
    for(let p of particles){ctx.fillStyle=p.col;ctx.globalAlpha=p.life/40;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    drawPhysicalPowerups();
    const ph=PHASES[currentPhaseIdx]||PHASES[0];ctx.fillStyle='#fff';ctx.font='bold 16px monospace';
    ctx.fillText(`SCORE: ${score}`,10,20);
    if (!justFinishedBonus && !phoenixBonusActive) {
      ctx.fillText(`${ph.name}`,W/2-40,20);
      const nb=currentBossIdx<ph.bosses.length?ph.bosses[currentBossIdx]:null;
      ctx.fillText(`NEXT: ${nb?nb.type.toUpperCase():'END'}`,W-150,20);
    } else if (phoenixBonusActive) {
      ctx.fillText(`BONUS`,W/2-40,20);
      const remaining = phoenixEnemies.filter(e => e.alive).length + phoenixSplitEnemies.filter(e => e.alive && e.alpha > 0).length;
      ctx.fillText(`NAVES: ${remaining}`,W-120,20);
    }
  }

  function loop() {
    try {
      if(!gameRunning && !bonusActive && !galaxianBonusActive && !phoenixBonusActive) {
        requestAnimationFrame(loop);
        return;
      }
      update();
      draw();
      requestAnimationFrame(loop);
    } catch(e) {
      console.error('Error en loop:', e);
      requestAnimationFrame(loop);
    }
  }

  document.getElementById('overlay').addEventListener('click',()=>{
    try {
      initAudio();
      gameRunning=true;
      document.getElementById('overlay').classList.add('hidden');
    } catch(e) { console.error('Error start:', e); }
  });

  showIntroScreen();
  loop();
  console.log('✅ Juego iniciado correctamente');
});
</script>
</body>
</html>
